version: "3.9"

services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672" # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - bitirme-net

  seq:
    image: datalust/seq:2024.3
    container_name: seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80" # Seq UI
      - "5342:5341" # Ingestion
    volumes:
      - seq-data:/data
    networks:
      - bitirme-net

  # ============================================
  # DATABASE SERVICES
  # ============================================

  identity-db:
    image: postgres:16-alpine
    container_name: identity-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: identitydb
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U identity_user -d identitydb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  project-db:
    image: postgres:16-alpine
    container_name: project-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectdb
      POSTGRES_USER: project_user
      POSTGRES_PASSWORD: project_pass
    ports:
      - "5434:5432"
    volumes:
      - project-db-data:/var/lib/postgresql/data
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U project_user -d projectdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  issue-db:
    image: postgres:16-alpine
    container_name: issue-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: issuedb
      POSTGRES_USER: issue_user
      POSTGRES_PASSWORD: issue_pass
    ports:
      - "5435:5432"
    volumes:
      - issue-db-data:/var/lib/postgresql/data
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U issue_user -d issuedb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  sprint-db:
    image: postgres:16-alpine
    container_name: sprint-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sprintdb
      POSTGRES_USER: sprint_user
      POSTGRES_PASSWORD: sprint_pass
    ports:
      - "5436:5432"
    volumes:
      - sprint-db-data:/var/lib/postgresql/data
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sprint_user -d sprintdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
    ports:
      - "5437:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U notification_user -d notificationdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  storage-db:
    image: postgres:16-alpine
    container_name: storage-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: storagedb
      POSTGRES_USER: storage_user
      POSTGRES_PASSWORD: storage_pass
    ports:
      - "5438:5432"
    volumes:
      - storage-db-data:/var/lib/postgresql/data
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U storage_user -d storagedb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-db:
    image: postgres:16-alpine
    container_name: ai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aidb
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_pass
    ports:
      - "5439:5432"
    volumes:
      - ai-db-data:/var/lib/postgresql/data
    networks:
      - bitirme-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ai_user -d aidb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MICROSERVICES
  # ============================================

  identity-api:
    build:
      context: .
      dockerfile: src/services/identity/IdentityService.Api/Dockerfile
    container_name: identity-api
    restart: unless-stopped
    depends_on:
      identity-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      # Database
      ConnectionStrings__IdentityDatabase: "Host=identity-db;Port=5432;Database=identitydb;Username=identity_user;Password=identity_pass"
      # RabbitMQ
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "admin"
      RabbitMQ__Password: "admin123"
      RabbitMQ__VirtualHost: "/"
      # Redis
      Redis__Configuration: "redis:6379,password=redis123"
      # Seq
      Seq__ServerUrl: "http://seq:5341"
      # JWT
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
      Jwt__ExpirationMinutes: "60"
      # SMTP (MailHog)
      Smtp__Host: "mailhog"
      Smtp__Port: "1025"
      Smtp__EnableSsl: "false"
      Smtp__FromAddress: "noreply@bitirmeproject.local"
    ports:
      - "5001:8080"
    networks:
      - bitirme-net

  project-api:
    build:
      context: .
      dockerfile: src/services/projects/ProjectService.Api/Dockerfile
    container_name: project-api
    restart: unless-stopped
    depends_on:
      project-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__ProjectDatabase: "Host=project-db;Port=5432;Database=projectdb;Username=project_user;Password=project_pass"
      ConnectionStrings__Redis: "redis:6379,password=redis123"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "admin"
      RabbitMQ__Password: "admin123"
      RabbitMQ__VirtualHost: "/"
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
      Jwt__ExpirationMinutes: "60"
    ports:
      - "5002:8080"
    networks:
      - bitirme-net

  issue-api:
    build:
      context: .
      dockerfile: src/services/issues/IssueService.Api/Dockerfile
    container_name: issue-api
    restart: unless-stopped
    depends_on:
      issue-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__IssueDatabase: "Host=issue-db;Port=5432;Database=issuedb;Username=issue_user;Password=issue_pass"
      ConnectionStrings__Redis: "redis:6379,password=redis123"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "admin"
      RabbitMQ__Password: "admin123"
      RabbitMQ__VirtualHost: "/"
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
      Jwt__ExpirationMinutes: "60"
    ports:
      - "5003:8080"
    networks:
      - bitirme-net

  sprint-api:
    build:
      context: .
      dockerfile: src/services/sprints/SprintService.Api/Dockerfile
    container_name: sprint-api
    restart: unless-stopped
    depends_on:
      sprint-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__SprintDatabase: "Host=sprint-db;Port=5432;Database=sprintdb;Username=sprint_user;Password=sprint_pass"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "admin"
      RabbitMQ__Password: "admin123"
      RabbitMQ__VirtualHost: "/"
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
      Jwt__ExpirationMinutes: "60"
    ports:
      - "5004:8080"
    networks:
      - bitirme-net

  notification-api:
    build:
      context: .
      dockerfile: src/services/notifications/NotificationService.Api/Dockerfile
    container_name: notification-api
    restart: unless-stopped
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__NotificationDatabase: "Host=notification-db;Port=5432;Database=notificationdb;Username=notification_user;Password=notification_pass"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "admin"
      RabbitMQ__Password: "admin123"
      RabbitMQ__VirtualHost: "/"
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
      Jwt__ExpirationMinutes: "60"
    ports:
      - "5005:8080"
    networks:
      - bitirme-net

  storage-api:
    build:
      context: .
      dockerfile: src/services/storage/StorageService.Api/Dockerfile
    container_name: storage-api
    restart: unless-stopped
    depends_on:
      storage-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__StorageDatabase: "Host=storage-db;Port=5432;Database=storagedb;Username=storage_user;Password=storage_pass"
      Storage__RootPath: "storage-uploads"
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
    ports:
      - "5007:8080"
    volumes:
      - storage-uploads:/app/storage-uploads
    networks:
      - bitirme-net

  ai-api:
    build:
      context: .
      dockerfile: src/services/ai/AiService.Api/Dockerfile
    container_name: ai-api
    restart: unless-stopped
    depends_on:
      ai-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__AiDatabase: "Host=ai-db;Port=5432;Database=aidb;Username=ai_user;Password=ai_pass"
      Ollama__BaseUrl: "http://host.docker.internal:11434"
      Ollama__Model: "gemma3:4b"
      Ollama__FallbackModel: "llama3.2:3b"
      Services__SprintService: "http://sprint-api:8080"
      Services__IssueService: "http://issue-api:8080"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "admin"
      RabbitMQ__Password: "admin123"
      RabbitMQ__VirtualHost: "/"
      Seq__ServerUrl: "http://seq:5341"
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
    ports:
      - "5008:8080"
    networks:
      - bitirme-net

  bff-api:
    build:
      context: .
      dockerfile: src/services/bff/Bff.Api/Dockerfile
    container_name: bff-api
    restart: unless-stopped
    depends_on:
      project-api:
        condition: service_started
      issue-api:
        condition: service_started
      sprint-api:
        condition: service_started
      notification-api:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
    ports:
      - "5006:8080"
    networks:
      - bitirme-net

  gateway-api:
    build:
      context: .
      dockerfile: src/gateway/ApiGateway/Dockerfile
    container_name: gateway-api
    restart: unless-stopped
    depends_on:
      identity-api:
        condition: service_started
      project-api:
        condition: service_started
      issue-api:
        condition: service_started
      sprint-api:
        condition: service_started
      notification-api:
        condition: service_started
      storage-api:
        condition: service_started
      ai-api:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      Jwt__Secret: "YourSuperSecretKeyForJwtTokenGenerationMinimum32Characters"
      Jwt__Issuer: "BitirmeProject.IdentityService"
      Jwt__Audience: "BitirmeProject.Clients"
    ports:
      - "5000:8080"
    networks:
      - bitirme-net

  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      gateway-api:
        condition: service_started
    environment:
      VITE_API_BASE_URL: "http://localhost:5000"
      VITE_USE_MOCK_API: "false"
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend/web:/app
      - /app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - bitirme-net

# ============================================
# NETWORKS
# ============================================

networks:
  bitirme-net:
    driver: bridge

# ============================================
# VOLUMES
# ============================================

volumes:
  rabbitmq-data:
  redis-data:
  seq-data:
  identity-db-data:
  project-db-data:
  issue-db-data:
  sprint-db-data:
  notification-db-data:
  storage-db-data:
  storage-uploads:
  ai-db-data:
