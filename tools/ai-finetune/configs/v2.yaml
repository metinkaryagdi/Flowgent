version: v2
created: 2026-05-14
notes: |
  v1'den farkı:
  - Dataset: 1417 örnek (v1: 930) — agent feature (487 örnek) eklendi
  - LoRA r=32 (v1: 16) — tool-calling yeni bir skill, daha fazla kapasite
  - num_train_epochs=3 sabit ama bu sefer EARLY STOP YASAK — v1 fine-tune 125 step'te
    yarıda kesildi, en kötü failure mode'u buydu. Tüm 3 epoch'u tamamla.
  - max_seq_length 2048 → 1536 (v2 p95=1138; daha kısa context daha hızlı eğitim)
  Colab Free T4 (16 GB) için optimize. RTX 4050 6 GB'te OOM beklenir.

base_model:
  name: unsloth/gemma-3-4b-it-bnb-4bit
  max_seq_length: 1536
  load_in_4bit: true
  dtype: null

lora:
  r: 32                                 # v1: 16 — tool-calling kapasitesi için 2×
  alpha: 64                             # r ile orantılı
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_gradient_checkpointing: unsloth
  random_state: 3407

training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8        # effective batch = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  optim: adamw_8bit
  fp16: true
  bf16: false
  logging_steps: 10
  save_steps: 100
  save_total_limit: 5                   # v1: 3 — daha çok checkpoint, geri dönüş için
  eval_steps: 100
  evaluation_strategy: steps
  load_best_model_at_end: false
  report_to: none
  seed: 3407

dataset:
  path: /content/drive/MyDrive/bp-finetune/datasets/train-v2.jsonl
  format: messages
  train_split: 0.9
  packing: false                        # JSON + multi-turn agent → packing zararlı

export:
  adapter_dir: /content/drive/MyDrive/bp-finetune/adapters/gemma3-4b-bp-v2
  save_method: lora
  gguf_quantization: q4_k_m

quick_eval:
  sample_size: 5                        # feature başına; 4 feature → 20 eval
  max_new_tokens: 1024
  temperature: 0.2
  top_p: 0.9
