version: v1
created: 2026-04-25
notes: |
  Colab Free T4 (16 GB VRAM) için optimize. RTX 4050 6 GB'te OOM beklenir;
  lokalde smoke test için batch=1, seq_len=1024, grad_accum=16 ile denenebilir.

base_model:
  name: unsloth/gemma-3-4b-it-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true
  dtype: null            # Unsloth auto (T4 -> float16)

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_gradient_checkpointing: unsloth
  random_state: 3407

training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8      # effective batch = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  optim: adamw_8bit
  fp16: true
  bf16: false                         # T4 bf16 desteklemiyor
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  eval_steps: 100
  evaluation_strategy: steps
  load_best_model_at_end: false       # Colab disconnect'e karşı false
  report_to: none                     # W&B/tensorboard kapalı, sıfır bütçe
  seed: 3407

dataset:
  path: /content/drive/MyDrive/bp-finetune/datasets/train-v1.jsonl
  format: messages                    # prepare_dataset.py çıktısı
  train_split: 0.9
  packing: false                      # JSON çıktısı hassas, packing sequence boundary'leri bulandırır

export:
  adapter_dir: /content/drive/MyDrive/bp-finetune/adapters/gemma3-4b-bp-v1
  save_method: lora                   # önce adapter, sonra gguf ayrı hücrede
  gguf_quantization: q4_k_m           # Ollama uyumlu

quick_eval:
  sample_size: 5                      # feature başına (toplam 15)
  max_new_tokens: 1024
  temperature: 0.2
  top_p: 0.9
